
name: Docker Image CI
 on:
   push:
     branches: [ "main" ]
   pull_request:
     branches: [ "main" ]
 jobs:
   build-firmware:
     runs-on: ubuntu-latest
     steps:
       # 1. 拉取代码（包含子模块）
       - name: Checkout code
         uses: actions/checkout@v4
         with:
           submodules: recursive
       # 2. 拉取 Thingino 构建镜像
       - name: Pull Thingino builder image
         run: docker pull themactep/thingino-builder:latest
       # 3. 编译固件
       - name: Compile firmware
         run: |
           docker run --rm -v ${{ github.workspace }}:/src themactep/thingino-builder:latest \
           make clean && make wanjiaan_hdc55_t20_sc2235 -j$(nproc)
       # 4. 上传编译好的固件
       - name: Upload firmware
         uses: actions/upload-artifact@v4
         with:
           name: thingino-t20-firmware
           path: output/*.bin
