name: firmware-stable

on:
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        description: 'Branch to build from'
        required: false
        default: 'master'
        options:
          - stable
          - master
      tg_scratch:
        type: boolean
        description: 'Use TG scratch channel'
        required: false
        default: false
      graph_enabled:
        type: boolean
        description: 'Enable build time graph'
        required: false
        default: false
      teacup_only:
        type: boolean
        description: 'Only build Tea Cup profile'
        required: false
        default: false
      debug_enabled:
        type: boolean
        description: 'Enable debug build'
        required: false
        default: false

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check whether to build
        id: check
        run: echo "should_build=true" >> "$GITHUB_OUTPUT"

  notify-begin:
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    outputs:
      start_time: ${{ steps.start.outputs.start_time }}
    steps:
      - name: Record start time
        id: start
        run: echo "start_time=$(date -u +%s)" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-24.04
    needs: [check-updates, notify-begin]
    if: needs.check-updates.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
          fetch-depth: 1
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt clean

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libncurses-dev \
            python3 python3-pip \
            git wget curl \
            unzip bzip2 \
            fakeroot \
            flex bison gawk \
            libtool automake autoconf \
            pkg-config zlib1g-dev

      - name: Prepare toolchain
        run: |
          ./scripts/prepare.sh

      - name: Build T20 firmware
        run: |
          if [ "${{ github.event.inputs.teacup_only }}" == "true" ]; then
            make BOARD=t20-teacup all
          else
            make BOARD=t20 all
          fi

      - name: Show firmware files
        run: |
          ls -la output/images/
          ls -la output/

      - name: Upload full firmware
        uses: actions/upload-artifact@v4
        with:
          name: openipc-t20-firmware
          path: |
            output/images/*.bin
            output/images/*.img
            output/*.bin
            output/*.img
            bin/*.bin
            bin/*.img

  finalize-release:
    runs-on: ubuntu-latest
    needs: [build, notify-begin]
    if: always() && needs.check-updates.outputs.should_build == 'true'
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: openipc-t20-firmware
          path: firmware

      - name: List firmware
        run: ls -la firmware/

  notify-completion:
    runs-on: ubuntu-24.04
    needs: [finalize-release, notify-begin, check-updates]
    if: always() && needs.check-updates.outputs.should_build == 'true'
    steps:
      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Calculate build time
        run: |
          START=${{ needs.notify-begin.outputs.start_time }}
          END=$(date -u +%s)
          ELAPSED=$((END - START))
          ELAPSED_MIN=$((ELAPSED / 60))
          ELAPSED_SEC=$((ELAPSED % 60))
          echo "ELAPSED=${ELAPSED_MIN}m ${ELAPSED_SEC}s" >> $GITHUB_ENV

      - name: Build completed
        run: |
          echo "========================================"
          echo " 君正 T20 摄像头固件编译完成"
          echo " 耗时：${{ env.ELAPSED }}"
          echo " 固件已打包，可以直接下载刷机"
          echo "========================================"
